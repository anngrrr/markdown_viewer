<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --border: #dedee3;
      --text: #222222;
      --muted: #6b7280;
      --accent: #2f6fed;
      --accent-soft: #eaf0ff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 12px;
      z-index: 20;
      transition: transform 0.22s ease, opacity 0.22s ease, box-shadow 0.22s ease;
    }

    .topbar.compact {
      transform: translateY(-6px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
    }

    .topbar.hidden-header .title,
    .topbar.hidden-header .subtitle,
    .topbar.hidden-header .controls {
      display: none;
    }

    .topbar.hidden-header {
      padding: 10px 14px;
    }

    .topbar.hidden-header .tabs {
      margin-top: 0;
    }

    .title {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .upload-label,
    .action-btn,
    .toolbar-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: 0.2s ease;
      text-decoration: none;
    }

    .upload-label:hover,
    .action-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .toolbar-pill {
      cursor: default;
      background: #fcfcfd;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .primary:hover {
      filter: brightness(1.03);
      background: var(--accent);
    }

    input[type="file"] {
      display: none;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 0;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 999px;
      padding: 6px 8px 6px 12px;
      cursor: default;
      font-size: 14px;
      transition: 0.2s ease;
      max-width: 360px;
      min-width: 0;
    }

    .tab.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .tab-main {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      flex: 1 1 auto;
      background: transparent;
      border: 0;
      padding: 2px 0;
      cursor: pointer;
      color: inherit;
      font: inherit;
      text-align: left;
    }

    .tab-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .tab-icon-btn {
      width: 26px;
      height: 26px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      transition: 0.18s ease;
    }

    .tab-icon-btn:hover {
      background: rgba(47, 111, 237, 0.08);
      border-color: rgba(47, 111, 237, 0.12);
      color: var(--accent);
    }

    .tab-rename-input {
      min-width: 220px;
      width: 100%;
      border: 1px solid var(--accent);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      color: var(--text);
      outline: none;
    }

    .content-wrap {
      margin-top: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 500px;
      overflow: hidden;
    }

    body.reading-mode .app {
      max-width: 100%;
      padding: 12px;
    }

    body.reading-mode .topbar {
      position: static;
      margin-bottom: 10px;
    }

    body.reading-mode .content-wrap {
      margin-top: 0;
      border-radius: 18px;
    }

    .empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: #fcfcfd;
    }

    body.reading-mode .toolbar {
      padding: 10px 14px;
    }

    .viewer {
      padding: 24px;
      line-height: 1.7;
      font-size: 17px;
      max-width: 1320px;
      margin: 0 auto;
    }

    body.reading-mode .viewer {
      max-width: none;
      padding: 28px 32px;
      font-size: 18px;
    }

    .viewer p,
    .viewer li,
    .viewer blockquote,
    .viewer td,
    .viewer th {
      line-height: 1.7;
    }

    .viewer h1,
    .viewer h2,
    .viewer h3,
    .viewer h4,
    .viewer h5,
    .viewer h6 {
      line-height: 1.35;
    }

    .viewer code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.92em;
    }

    .viewer pre {
      background: #111827;
      color: #f9fafb;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
    }

    .viewer pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    .viewer a {
      color: var(--accent);
    }

    .viewer img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
    }

    .viewer table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 15px;
    }

    .viewer th,
    .viewer td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    .section {
      margin: 0 0 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }

    .section[open] {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
    }

    .section-summary,
    .block-summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .section-summary {
      padding: 14px 16px;
      background: #fafafa;
      border-bottom: 1px solid transparent;
    }

    .section[open] > .section-summary {
      border-bottom-color: var(--border);
    }

    .section-summary::-webkit-details-marker,
    .block-summary::-webkit-details-marker {
      display: none;
    }

    .chevron {
      width: 10px;
      height: 10px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(-45deg);
      transition: transform 0.2s ease;
      margin-top: 5px;
      flex: 0 0 auto;
    }

    .section[open] > .section-summary .chevron,
    .block-fold[open] > .block-summary .chevron {
      transform: rotate(45deg);
      margin-top: 2px;
    }

    .summary-text {
      min-width: 0;
      width: 100%;
    }

    .summary-title {
      font-weight: 650;
      line-height: 1.35;
      word-break: break-word;
    }

    .section-body {
      padding: 16px 18px 18px;
    }

    .section-body > :first-child {
      margin-top: 0;
    }

    .section-body > :last-child {
      margin-bottom: 0;
    }

    .nested {
      margin-top: 14px;
      padding-left: 12px;
      border-left: 2px solid #ececf1;
    }

    .intro-block {
      margin-bottom: 12px;
    }

    .block-fold {
      margin: 10px 0;
      border: 1px dashed #e5e7eb;
      border-radius: 12px;
      background: #fcfcfd;
      overflow: hidden;
    }

    .block-summary {
      padding: 10px 12px;
      background: #fcfcfd;
      transition: padding 0.18s ease, background 0.18s ease;
    }

    .block-fold[open] > .block-summary {
      padding: 4px 8px;
      background: #ffffff;
      border-bottom: 1px dashed #ececf1;
      align-items: center;
      min-height: 24px;
    }

    .block-content {
      padding: 0 12px 12px;
    }

    .block-content > :first-child {
      margin-top: 8px;
    }

    .block-content > :last-child {
      margin-bottom: 0;
    }

    .preview-text {
      display: block;
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      word-break: break-word;
    }

    .block-fold[open] > .block-summary .preview-text {
      display: none;
    }

    .compact-open-row {
      display: none;
      height: 10px;
      width: 100%;
    }

    .block-fold[open] > .block-summary .compact-open-row {
      display: block;
    }

    @media (max-width: 760px) {
      .app {
        padding: 14px;
      }

      .viewer {
        padding: 16px;
        font-size: 16px;
      }

      body.reading-mode .viewer {
        padding: 18px 16px;
        font-size: 16px;
      }

      .tab {
        max-width: 100%;
      }

      .tab-rename-input {
        min-width: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1 class="title">Markdown Viewer</h1>
      <p class="subtitle">Загружай несколько Markdown-файлов, держи их открытыми как вкладки и сворачивай как крупные разделы, так и отдельные блоки текста.</p>

      <div class="controls">
        <label class="upload-label primary" for="fileInput">Загрузить Markdown</label>
        <input id="fileInput" type="file" accept=".md,.markdown,text/markdown" multiple />
        <button class="action-btn" id="expandAllBtn" type="button">Развернуть всё</button>
        <button class="action-btn" id="collapseAllBtn" type="button">Свернуть всё</button>
        <button class="action-btn" id="readingModeBtn" type="button">Режим чтения</button>
      </div>

      <div class="tabs" id="tabs"></div>
    </div>

    <div class="content-wrap">
      <div id="emptyState" class="empty">
        Пока ничего не загружено.<br />
        Выбери один или несколько файлов `.md`.
      </div>
      <div id="contentArea" hidden>
        <div class="toolbar">
          <span class="toolbar-pill" id="fileInfo">Файл не выбран</span>
        </div>
        <div class="viewer" id="viewer"></div>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const tabs = document.getElementById('tabs');
    const viewer = document.getElementById('viewer');
    const emptyState = document.getElementById('emptyState');
    const contentArea = document.getElementById('contentArea');
    const fileInfo = document.getElementById('fileInfo');
    const expandAllBtn = document.getElementById('expandAllBtn');
    const collapseAllBtn = document.getElementById('collapseAllBtn');
    const readingModeBtn = document.getElementById('readingModeBtn');
    const topbar = document.querySelector('.topbar');

    const state = {
      files: [],
      activeId: null,
      renamingId: null,
      readingMode: false,
      lastScrollY: window.scrollY,
      isHeaderCompact: false,
    };

    fileInput.addEventListener('change', async (event) => {
      const selectedFiles = Array.from(event.target.files || []);
      if (!selectedFiles.length) return;

      const loaded = await Promise.all(selectedFiles.map(readMarkdownFile));

      loaded.forEach((fileData) => {
        state.files.push(fileData);
      });

      if (!state.activeId) {
        state.activeId = loaded[0]?.id || null;
      }

      renderTabs();
      renderActiveFile();
      fileInput.value = '';
    });

    expandAllBtn.addEventListener('click', () => {
      viewer.querySelectorAll('details').forEach((item) => {
        item.open = true;
      });
    });

    collapseAllBtn.addEventListener('click', () => {
      viewer.querySelectorAll('details').forEach((item) => {
        item.open = false;
      });
    });

    readingModeBtn.addEventListener('click', () => {
      state.readingMode = !state.readingMode;
      document.body.classList.toggle('reading-mode', state.readingMode);
      readingModeBtn.textContent = state.readingMode ? 'Обычный режим' : 'Режим чтения';
      if (state.readingMode) {
        state.isHeaderCompact = false;
        topbar.classList.remove('hidden-header');
        topbar.classList.remove('compact');
      }
    });

    window.addEventListener('scroll', () => {
      if (state.readingMode) return;

      const currentY = window.scrollY;
      const delta = currentY - state.lastScrollY;
      const compactThreshold = 80;
      const expandThreshold = 24;

      if (!state.isHeaderCompact && currentY > compactThreshold && delta > 0) {
        state.isHeaderCompact = true;
        topbar.classList.add('hidden-header');
        topbar.classList.add('compact');
      } else if (state.isHeaderCompact && currentY < expandThreshold) {
        state.isHeaderCompact = false;
        topbar.classList.remove('hidden-header');
        topbar.classList.remove('compact');
      }

      state.lastScrollY = currentY;
    });

    function readMarkdownFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const text = String(reader.result || '');
          resolve({
            id: crypto.randomUUID(),
            name: file.name,
            displayName: file.name,
            size: file.size,
            text,
            parsed: parseMarkdownToSections(text),
          });
        };
        reader.onerror = reject;
        reader.readAsText(file, 'utf-8');
      });
    }

    function renderTabs() {
      tabs.innerHTML = '';

      state.files.forEach((file) => {
        const tab = document.createElement('div');
        tab.className = `tab ${file.id === state.activeId ? 'active' : ''}`;

        if (state.renamingId === file.id) {
          const input = document.createElement('input');
          input.className = 'tab-rename-input';
          input.type = 'text';
          input.value = file.displayName || file.name;
          input.setAttribute('aria-label', 'Переименовать вкладку');

          input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
              commitTabRename(file.id, input.value);
            }
            if (event.key === 'Escape') {
              state.renamingId = null;
              renderTabs();
            }
          });

          input.addEventListener('blur', () => {
            commitTabRename(file.id, input.value);
          });

          tab.appendChild(input);
          tabs.appendChild(tab);

          requestAnimationFrame(() => {
            input.focus();
            input.select();
          });
          return;
        }

        const mainBtn = document.createElement('button');
        mainBtn.type = 'button';
        mainBtn.className = 'tab-main';
        mainBtn.title = file.displayName || file.name;
        mainBtn.addEventListener('click', () => {
          state.activeId = file.id;
          renderTabs();
          renderActiveFile();
        });

        const name = document.createElement('span');
        name.className = 'tab-name';
        name.textContent = file.displayName || file.name;
        mainBtn.appendChild(name);

        const actions = document.createElement('div');
        actions.className = 'tab-actions';

        const renameBtn = document.createElement('button');
        renameBtn.type = 'button';
        renameBtn.className = 'tab-icon-btn';
        renameBtn.title = 'Переименовать';
        renameBtn.textContent = '✎';
        renameBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          state.renamingId = file.id;
          renderTabs();
        });

        const closeBtn = document.createElement('button');
        closeBtn.type = 'button';
        closeBtn.className = 'tab-icon-btn';
        closeBtn.title = 'Закрыть';
        closeBtn.textContent = '×';
        closeBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          closeTab(file.id);
        });

        actions.appendChild(renameBtn);
        actions.appendChild(closeBtn);

        tab.appendChild(mainBtn);
        tab.appendChild(actions);
        tabs.appendChild(tab);
      });
    }

    function commitTabRename(fileId, nextName) {
      const file = state.files.find((item) => item.id === fileId);
      if (!file) return;

      const trimmed = String(nextName || '').trim();
      file.displayName = trimmed || file.name;
      state.renamingId = null;
      renderTabs();
      renderActiveFile();
    }

    function closeTab(fileId) {
      const index = state.files.findIndex((item) => item.id === fileId);
      if (index < 0) return;

      const wasActive = state.activeId === fileId;
      state.files.splice(index, 1);

      if (state.renamingId === fileId) {
        state.renamingId = null;
      }

      if (!state.files.length) {
        state.activeId = null;
      } else if (wasActive) {
        const fallback = state.files[Math.max(0, index - 1)] || state.files[0];
        state.activeId = fallback.id;
      }

      renderTabs();
      renderActiveFile();
    }

    function renderActiveFile() {
      const active = state.files.find((item) => item.id === state.activeId);

      if (!active) {
        emptyState.hidden = false;
        contentArea.hidden = true;
        return;
      }

      emptyState.hidden = true;
      contentArea.hidden = false;
      fileInfo.textContent = `${active.displayName || active.name} - ${formatBytes(active.size)} - открытых вкладок: ${state.files.length}`;
      viewer.innerHTML = '';

      if (!active.parsed.sections.length && active.parsed.looseHtml.trim()) {
        const onlyContent = document.createElement('div');
        onlyContent.innerHTML = active.parsed.looseHtml;
        makeBlocksCollapsible(onlyContent);
        viewer.appendChild(onlyContent);
        return;
      }

      if (active.parsed.looseHtml.trim()) {
        const introBody = document.createElement('div');
        introBody.className = 'intro-block';
        introBody.innerHTML = active.parsed.looseHtml;
        makeBlocksCollapsible(introBody);
        viewer.appendChild(introBody);
      }

      active.parsed.sections.forEach((section) => {
        viewer.appendChild(createSectionElement(section));
      });
    }

    function parseMarkdownToSections(markdown) {
      const tokens = marked.lexer(markdown);
      const root = [];
      const stack = [];
      const looseTokens = [];

      for (const token of tokens) {
        if (token.type === 'heading') {
          const section = {
            title: token.text,
            depth: token.depth,
            tokens: [],
            children: [],
          };

          while (stack.length && stack[stack.length - 1].depth >= section.depth) {
            stack.pop();
          }

          if (stack.length) {
            stack[stack.length - 1].children.push(section);
          } else {
            root.push(section);
          }

          stack.push(section);
        } else if (stack.length) {
          stack[stack.length - 1].tokens.push(token);
        } else {
          looseTokens.push(token);
        }
      }

      return {
        looseHtml: marked.parser(looseTokens),
        sections: root.map(finalizeSection),
      };
    }

    function finalizeSection(section) {
      return {
        ...section,
        html: marked.parser(section.tokens),
        children: section.children.map(finalizeSection),
      };
    }

    function createSectionElement(section) {
      const details = document.createElement('details');
      details.className = 'section';
      details.open = false;

      const summary = document.createElement('summary');
      summary.className = 'section-summary';
      summary.innerHTML = `
        <span class="chevron"></span>
        <span class="summary-text">
          <div class="summary-title">${escapeHtml(section.title)}</div>
        </span>
      `;

      const body = document.createElement('div');
      body.className = 'section-body';

      if (section.html.trim()) {
        const content = document.createElement('div');
        content.innerHTML = section.html;
        makeBlocksCollapsible(content);
        body.appendChild(content);
      }

      if (section.children.length) {
        const nested = document.createElement('div');
        nested.className = 'nested';
        section.children.forEach((child) => {
          nested.appendChild(createSectionElement(child));
        });
        body.appendChild(nested);
      }

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function makeBlocksCollapsible(container) {
      const candidates = Array.from(container.children);

      candidates.forEach((node) => {
        if (!shouldWrapNode(node)) return;
        wrapNodeInCollapsible(node);
      });
    }

    function shouldWrapNode(node) {
      const tag = node.tagName;
      return ['P', 'UL', 'OL', 'PRE', 'BLOCKQUOTE', 'TABLE', 'IMG'].includes(tag);
    }

    function wrapNodeInCollapsible(node) {
      const wrapper = document.createElement('details');
      wrapper.className = 'block-fold';
      wrapper.open = false;

      const summary = document.createElement('summary');
      summary.className = 'block-summary';

      const preview = getPreviewText(node);
      summary.innerHTML = `
        <span class="chevron"></span>
        <span class="summary-text">
          <span class="preview-text">${escapeHtml(preview)}</span>
          <span class="compact-open-row"></span>
        </span>
      `;

      const content = document.createElement('div');
      content.className = 'block-content';
      content.appendChild(node.cloneNode(true));

      wrapper.appendChild(summary);
      wrapper.appendChild(content);
      node.replaceWith(wrapper);
    }

    function getPreviewText(node) {
      if (node.tagName === 'IMG') {
        return node.getAttribute('alt') || 'Изображение';
      }

      const text = (node.textContent || '').replace(/\s+/g, ' ').trim();
      if (!text) return '...';
      if (text.length <= 140) return text;
      return `${text.slice(0, 140)}...`;
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
